<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="icon" href="static - images/skilltest_logo1.png">
    <link rel="stylesheet" href="signup.css">

     <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Sekuya&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <img src="static - images/skilltest_logo.png" alt="Skill Test Logo" class="logo">
    
    <input type="checkbox" id="menu-toggle" style="display:none;">
    <label for="menu-toggle" class="menu-icon">|||</label>
    
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#profile">
            <img src="static - images/boy-removebg-preview.png" alt="Profile Image" class="profile">
        </a></li>
    </ul>
</header>
    

<center><section>
    <div class="login-form">
        <form action="/signup" method="POST" id="signupform">
            <h2>Sign Up</h2>
            <input type="text" name="username" placeholder="Username" id="username" required><br>
            <input type="email" name="email" placeholder="Email" id="email"><br>
            <input type="password" name="password" placeholder="Password" id="pword"><br>
            <input type="password" name="confirmpassword" placeholder="Confirm password" id="pword1"><br>
            <button type="submit">Sign Up</button>
            <button type="reset">Reset</button>
        </form>
        <script src="signup.js"></script>

    </div>
</section></center>


<div>
    <img src="static - images/skilltest_wave.svg" alt="">
    <div class="middle-part"></div>
</div>

<footer>
    <p>&copy; 2023 Skill Test. All rights reserved.</p>
</footer>
</body>
</html>
